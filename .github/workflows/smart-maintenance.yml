name: Cyber Smart Repository Maintenance

on:
  workflow_dispatch:
    inputs:
      draw_cyber:
        description: "Draw CYBER contribution art"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"
      start_date:
        description: "Use today or YYYY-MM-DD. If not Sunday, it will use next Sunday automatically."
        required: true
        default: "today"
      intensity:
        description: "Commits per green square"
        required: true
        default: "6"

  schedule:
    - cron: "37 7,19 * * *"

permissions:
  contents: write

concurrency:
  group: cyber-smart-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Draw CYBER contribution art
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.draw_cyber == 'yes'
        env:
          START_DATE_INPUT: ${{ github.event.inputs.start_date }}
          INTENSITY_INPUT: ${{ github.event.inputs.intensity }}
          CYBER_NAME: "Imed Kablavi"
          CYBER_EMAIL: "emad.info1@gmail.com"
        run: |
          set -euo pipefail

          git config user.name "$CYBER_NAME"
          git config user.email "$CYBER_EMAIL"

          mkdir -p .github/contribution-art

          MARKER_FILE=".github/contribution-art/cyber-art-created.txt"

          if [ -f "$MARKER_FILE" ]; then
            echo "CYBER art already exists. Delete $MARKER_FILE if you want to regenerate it."
            exit 0
          fi

          python3 <<'PY'
          from datetime import date, timedelta
          import os
          import pathlib
          import subprocess

          raw_start = os.environ.get("START_DATE_INPUT", "today").strip().lower()
          raw_intensity = os.environ.get("INTENSITY_INPUT", "6").strip()

          if raw_start in ("today", "now", ""):
              start = date.today()
          else:
              start = date.fromisoformat(raw_start)

          intensity = int(raw_intensity)

          if intensity < 1 or intensity > 20:
              raise SystemExit("INTENSITY must be between 1 and 20")

          # Python: Monday=0 ... Sunday=6
          # GitHub contribution graph weeks start visually from Sunday.
          if start.weekday() != 6:
              days_until_sunday = (6 - start.weekday()) % 7
              adjusted = start + timedelta(days=days_until_sunday)
              print(f"START_DATE {start} is not Sunday. Using next Sunday: {adjusted}")
              start = adjusted

          art_file = pathlib.Path(".github/contribution-art/cyber.txt")

          letters = {
              "C": [
                  "1111",
                  "1000",
                  "1000",
                  "1000",
                  "1000",
                  "1000",
                  "1111",
              ],
              "Y": [
                  "1001",
                  "1001",
                  "0110",
                  "0010",
                  "0010",
                  "0010",
                  "0010",
              ],
              "B": [
                  "1110",
                  "1001",
                  "1001",
                  "1110",
                  "1001",
                  "1001",
                  "1110",
              ],
              "E": [
                  "1111",
                  "1000",
                  "1000",
                  "1110",
                  "1000",
                  "1000",
                  "1111",
              ],
              "R": [
                  "1110",
                  "1001",
                  "1001",
                  "1110",
                  "1010",
                  "1001",
                  "1001",
              ],
          }

          word = "CYBER"
          rows = [""] * 7

          for index, char in enumerate(word):
              pattern = letters[char]
              for row in range(7):
                  rows[row] += pattern[row]
                  if index != len(word) - 1:
                      rows[row] += "0"

          print("CYBER pattern:")
          print("\n".join(rows))
          print(f"Final start date: {start.isoformat()}")

          commit_count = 0

          for col in range(len(rows[0])):
              for row in range(7):
                  if rows[row][col] != "1":
                      continue

                  commit_date = start + timedelta(days=(col * 7) + row)

                  for i in range(intensity):
                      art_file.parent.mkdir(parents=True, exist_ok=True)

                      with art_file.open("a", encoding="utf-8") as file:
                          file.write(f"{commit_date.isoformat()} CYBER contribution art #{i + 1}\n")

                      env = os.environ.copy()
                      stamp = f"{commit_date.isoformat()}T12:00:00+00:00"
                      env["GIT_AUTHOR_DATE"] = stamp
                      env["GIT_COMMITTER_DATE"] = stamp

                      subprocess.run(["git", "add", str(art_file)], check=True, env=env)
                      subprocess.run(
                          ["git", "commit", "-m", f"art: draw CYBER {commit_date.isoformat()} #{i + 1}"],
                          check=True,
                          env=env,
                          stdout=subprocess.DEVNULL,
                      )

                      commit_count += 1

          print(f"Created {commit_count} CYBER art commits.")
          PY

          {
            echo "CYBER contribution art generated."
            echo "Input start date: $START_DATE_INPUT"
            echo "Intensity: $INTENSITY_INPUT"
            echo "Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          } > "$MARKER_FILE"

          git add "$MARKER_FILE"
          git commit -m "chore: mark CYBER contribution art as generated"

      - name: Generate maintenance report
        run: |
          set -euo pipefail

          # مهم: الصيانة تستخدم bot حتى ما تخرب رسم CYBER بحسابك
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PROJECT="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          DATE_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          DAY="$(date -u '+%A')"
          WEEK="$(date -u '+%V')"
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT_SHA="$(git rev-parse --short HEAD)"
          TOTAL_COMMITS="$(git rev-list --count HEAD || echo 0)"
          WEEK_COMMITS="$(git rev-list --count --since='7 days ago' HEAD || echo 0)"
          FILE_COUNT="$(git ls-files | wc -l | tr -d ' ')"

          mkdir -p .github/maintenance

          REPORT_FILE=".github/maintenance/activity-week-${WEEK}.md"
          COUNTER_FILE=".github/maintenance/run-counter.txt"

          if [ ! -f "$COUNTER_FILE" ]; then
            echo "0" > "$COUNTER_FILE"
          fi

          RUN_COUNT=$(( $(cat "$COUNTER_FILE") + 1 ))
          echo "$RUN_COUNT" > "$COUNTER_FILE"

          SIGN_DATA="$PROJECT|$OWNER|$BRANCH|$COMMIT_SHA|$RUN_COUNT|$DATE_UTC"
          HASH="$(echo "$SIGN_DATA" | sha256sum | cut -d' ' -f1)"

          {
            echo ""
            echo "## Maintenance Run #$RUN_COUNT"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Project | $PROJECT |"
            echo "| Owner | $OWNER |"
            echo "| Branch | $BRANCH |"
            echo "| Latest Commit | $COMMIT_SHA |"
            echo "| Total Commits | $TOTAL_COMMITS |"
            echo "| Weekly Commits | $WEEK_COMMITS |"
            echo "| Tracked Files | $FILE_COUNT |"
            echo "| Day | $DAY |"
            echo "| Week | $WEEK |"
            echo "| Time | $DATE_UTC |"
            echo "| Integrity Hash | \`$HASH\` |"
          } >> "$REPORT_FILE"

          git add .github/maintenance/

          if git diff --cached --quiet; then
            echo "No maintenance changes to commit."
          else
            git commit -m "chore: update automated maintenance log"
          fi

      - name: Push changes
        run: |
          set -euo pipefail
          git push origin "HEAD:${GITHUB_REF_NAME}"
